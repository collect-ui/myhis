service:
  - key: soft_download
    http: true
    module: empty
    params:
      path:
        template: '{{get_key `local_file_dir`}}/dist.zip'
    handler_params:
      - key: file2result
        path: "[path]"

  - key: tb_project_query
    http: true
    module: sql
    params:
      search:
        template: "{{ if .search}}%{{.search}}%{{ end}}"
    data_file: tb_project_query.sql

  - key: tb_project_update
    http: true
    module: model_update
    table: tb_project
    params:
      tb_project_id:
        check:
          template: "{{must .tb_project_id}}"
          err_msg: 记录不能为空
#      code:
#        check:
#          template: "{{must .code}}"
#          err_msg: 项目编码不能为空
    handler_params:
      - key: service2field
        service:
          service: autodesk.tb_project_query
          exclude: "[tb_project_id]"
          name: "[name]"
        save_field: tb
        template: "{{ eq (len .tb) 0}}"
        err_msg: "【{{.name}}】 已经存在"
    filter:
      tb_project_id: "[tb_project_id]"
  - key: tb_project_delete
    http: true
    module: model_delete
    table: tb_project
    params:
      tb_project_id_list:
        check:
          template: "{{must .tb_project_id_list}}"
          err_msg: 记录不能为空
    handler_params:
      - key: service2field
        service:
          service: autodesk.tb_config_delete_by_tb_project_id_list
          tb_project_id_list: "[tb_project_id_list]"
      - key: service2field
        service:
          service: autodesk.doc_project_query
          tb_project_id_list: "[tb_project_id_list]"
        save_field: doc_project_list
      - key: prop_arr
        name: "获取ID"
        enable: "{{must .doc_project_list}}"
        foreach: "[doc_project_list]"
        value: "[doc_project_id]"
        save_field: doc_project_id_list
      - key: service2field
        name: "删除文档的项目"
        enable: "{{must .doc_project_id_list }}"
        service:
          service: autodesk.doc_project_delete
          doc_project_id_list: "[doc_project_id_list]"

    filter:
      tb_project_id__in: "[tb_project_id_list]"
  - key: tb_project_save
    http: true
    module: model_save
    table: tb_project

    params:
      tb_project_id:
        template: "{{if .tb_project_id}}{{.tb_project_id}}{{else}}{{uuid}}{{end}}"
      name:
        check:
          template: "{{must .name}}"
          err_msg: 名称不能为空
      pdf_path:
        check:
          template: "{{must .pdf_path}}"
          err_msg: pdf路径不能为空
      zbj_path:
        check:
          template: "{{must .zbj_path}}"
          err_msg: zbj路径不能为空
      zf_path:
        default: ""
      create_time:
        template: "{{current_date_time}}"
      create_user:
        template: "{{.session_user_id}}"
      real_path:
        template: "{{replace (get_key `local_file_dir`) (get_key `file_prefix`) ``}}{{.pdf_path}}"

      zbj_real_path:
        template: "{{replace (get_key `local_file_dir`) (get_key `file_prefix`) ``}}{{.zbj_path}}"
    handler_params:
      - key: service2field
        service:
          service: autodesk.tb_project_query
          name: "[name]"
          with_role_user: true
        save_field: tb
        template: "{{ eq (len .tb) 0}}"
        err_msg: "【{{.name}}】 已经存在"

      - key: service2field
        name: 获取公共字段
        service:
          service: autodesk.get_tb_common
        save_field: tb_common
      - key: service2field
        name: 获取文件路径，解析pdf
        service:
          service: autodesk.extract_bid
          path: "[real_path]"
          tb_common: "[tb_common]"
        save_field: data
      - key: service2field
        service:
          service: autodesk.tb_config_detail_save
        append_param: true
        append_item_param: true
        item: "[data]"
      - key: service2field
        service:
          service: autodesk.save_tender
          path: "[zbj_real_path]"
          tb_project_id: "[tb_project_id]"
          name: "[name]"
          code: "[code]"


  - key: upload_tb_project
    module: empty
    http: true
    params:
      tb_project_id:
        template: "{{uuid}}"

    handler_params:
      - key: service2field
        name: 解析pdf 获取基本字段
        service:
          service: sport.upload_course_attachment
          type: "template"
          only_path: false
        save_field: project_info
      - key: service2field
        name: 获取公共字段
        service:
          service: autodesk.get_tb_common
        save_field: tb_common
      - key: service2field
        name: 获取文件路径，解析pdf
        service:
          service: autodesk.extract_bid
          path: "[project_info.real_path]"
          tb_common: "[tb_common]"
        save_field: data

      - key: update_field
        name: 更新字段
        fields:
          - field: "[data.name]"
            template: "[data.project_name]"
          - field: "[data.path]"
            template: "[project_info.path]"
      - key: param2result
        field: "[data]"
