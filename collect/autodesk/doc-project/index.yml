service:
  - key: doc_project_query
    http: true
    module: sql
    params:
      search:
        template: "{{ if .search}}%{{.search}}%{{ end}}"
      to_obj:
        default: false
    data_file: doc_project_query.sql
    result_handler:
      - key: arr2obj
        enable: "[to_obj]"

  - key: doc_project_update
    http: true
    module: model_update
    table: doc_project
    params:
      doc_project_id:
        check:
          template: "{{must .doc_project_id}}"
          err_msg: 记录不能为空
      code:
        check:
          template: "{{must .code}}"
          err_msg: 项目编码不能为空
    handler_params:
      - key: service2field
        service:
          service: autodesk.doc_project_query
          exclude: "[doc_project_id]"
          code: "[code]"
        save_field: tb
        template: "{{ eq (len .tb) 0}}"
        err_msg: "【{{.code}}】 已经存在"
    filter:
      doc_project_id: "[doc_project_id]"

  - key: doc_project_delete
    http: true
    module: model_delete
    table: doc_project
    params:
      doc_project_id_list:
        check:
          template: "{{must .doc_project_id_list}}"
          err_msg: 记录不能为空
    filter:
      doc_project_id__in: "[doc_project_id_list]"
    result_handler:
      - key: service2field
        service:
          service: autodesk.doc_project_detail_delete_by_doc_project_id
          doc_project_id_list: "[doc_project_id_list]"
      - key: service2field
        service:
          service: autodesk.doc_project_content_delete_by_doc_project_id
          doc_project_id_list: "[doc_project_id_list]"
  - key: doc_project_save
    http: true
    module: model_save
    table: doc_project
    params:
      doc_project_id:
        template: "{{ if .doc_project_id}}{{.doc_project_id}}{{else}}{{uuid}}{{end}}"
#      code:
#        check:
#          template: "{{must .code}}"
#          err_msg: 编码不能为空
      create_time:
        template: "{{current_date_time}}"
      create_user:
        template: "{{.session_user_id}}"
