service:
  - key: download_attachments
    http: true
    module: empty
    params:
      tb_project_id:
        check:
          template: "{{must .tb_project_id}}"
          err_msg: "tb_project_id不能为空"
      schema_page_code:
        check:
          template: "{{must .schema_page_code}}"
          err_msg: "schema_page_code不能为空"
      parent_path:
        template: "{{must .parent_path}}"
      zip_path:
        template: './template/{{current_date_format "20220202"}}/price_{{  replace (sub_str current_date_time -8 0) ":" ""}}_{{sub_str uuid -8 0}}.zip'
      response_name:
        default: "项目文件.zip"
    handler_params:
      - key: service2field
        service:
          service: autodesk.tb_config_query
          tb_project_id: "[tb_project_id]"
          only_attachments: true
          schema_page_code: "[schema_page_code]"
        save_field: attachments
      - key: update_array
        foreach: "[attachments]"
        item: item
        fields:
          - field: value
            template: "{{replace (get_key `local_file_dir`) (get_key `file_prefix`) ``}}{{.item.value}}"
#      - key: param2result
#        field: "[attachments]"
      - key: files2result
        foreach: "[attachments]"
        item: item
        path: "[zip_path]"
        file: "[item.value]"

  - key: gen_tbj
    http: true
    module: empty
    params:
      path:
        check:
          template: "{{must .path}}"
          err_msg: "路径不能为空不能为空"
    handler_params:
      - key: update_field
        name: 更新字段
        fields:
          - field: local_path
            template: "{{replace .path (get_key `file_prefix`) (get_key `local_file_dir`) }}"
          - field: to_path
            template: "{{replace .path `ZBJ` `TBJ`}}"
          - field: local_to_path
            template: "{{replace .to_path (get_key `file_prefix`) (get_key `local_file_dir`)  }}"
      - key: file2str
        path: "[local_path]"
        save_field: "xml_data"

      - key: service2field
        service:
          service: autodesk.zbjToTbj
          data: "[xml_data]"
        save_field: result
      - key: str2file
        path: "[local_to_path]"
        value: "[result.data]"
      - key: params2result
        fields:
          - from: "[to_path]"
            to: to_path
          - from: "[local_to_path]"
            to: local_to_path

  - key: zbjToTbj
    module: http
    params:
      data:
        check:
          template: "{{must .data}}"
          err_msg: "data不能为空"
    handler_params:
      - key: gen_sign
        field: "[data]"
    http_json: zbjToTbj.json
  - key: tb_config_delete_by_tb_project_id_list
    http: true
    module: model_delete
    table: tb_config
    params:
      tb_project_id_list:
        check:
          template: "{{must .tb_project_id_list}}"
          err_msg: 记录不能为空
    filter:
      tb_project_id__in: "[tb_project_id_list]"
  - key: extract_bid
    module: empty
    http: true
    params:
      path:
        check:
          template: "{{must .path}}"
          err_msg: "path不能为空"
      schema_page_code:
        default: "tb_config"
      tb_common:
        default: {}
    handler_params:
      - key: service2field
        service:
          service: system.get_page_schema_field
          schema_page_code: "[schema_page_code]"
        save_field: schema_fields
      - key: extract_bid
        foreach: "[schema_fields]"
        path: "[path]"
        save_field: result
      - key: param2result
        field: "[result]"
  - key: get_file_field_list
    http: true
    module: sql
    params:
      tb_project_id:
        check:
          template: "{{must .tb_project_id}}"
          err_msg: "tb_project_id不能为空"
      schema_page_code:
        default: "tb_config"
    data_file: get_file_field_list.sql
  - key: render_doc
    http: true
    module: empty
    modify_config: tb_config_detail_modify.json
    params:
      tb_project_id:
        check:
          template: "{{must .tb_project_id}}"
          err_msg: "tb_project_id不能为空"
    handler_params:
      - key: service2field
        service:
          service: autodesk.get_file_field_list
          tb_project_id: "[tb_project_id]"
        save_field: fileList
        template: "{{gt (len .fileList) 0}}"
        err_msg: "未找到任何文件模板"
      - key: service2field
        service:
          service: autodesk.tb_config_detail
          tb_project_id: "[tb_project_id]"
        save_field: detail
      - key: render_doc
        enable: "{{must .fileList}}"
        foreach: "[fileList]"
        field: "[detail]"
        save_field: remote_data
      - key: update_array
        enable: "{{must .fileList}}"
        foreach: "[remote_data]"
        item: item
        fields:
          - field: key
            template: "[item.link]"
          - field: value
            template: "[item.link_value]"
      - key: prop_arr
        foreach: "[remote_data]"
        value: "[key]"
        save_field: fields
      - key: service2field
        name: 查询业务数据
        service:
          service: autodesk.tb_config_query
          tb_project_id: "[tb_project_id]"
          fields: "[fields]"
        save_field: local_data

      - key: get_modify_data
        save_field: change_list

      - key: filter_arr
        name: 过滤添加列表
        foreach: "[change_list]"
        item: item
        if_template: "{{eq .item.operation \"add\" }}"
        save_field: add_list
      - key: update_array
        enable: "{{must .add_list}}"
        foreach: "[add_list]"
        item: item
        fields:
          - field: tb_project_id
            template: "[tb_project_id]"
          - field: create_time
            template: "{{current_date_time}}"
          - field: tb_config_id
            template: "{{uuid}}"
          - field: create_user
            template: "{{.session_user_id}}"
      - key: service2field
        enable: "{{must .add_list}}"
        service:
          service: autodesk.tb_config_bulk_create
          tb_config_list: "[add_list]"
      - key: filter_arr
        name: 过滤添加列表
        enable: "{{must .change_list}}"
        foreach: "[change_list]"
        item: item
        if_template: "{{eq .item.operation \"modify\" }}"
        save_field: update_list
      - key: service2field
        enable: "{{must .update_list}}"
        service:
          service: autodesk.tb_config_bulk_update
          tb_config_list: "[update_list]"

      - key: params2result
        fields:
          - from: "[remote_data]"
            to: remote_data
          - from: "[tb_project_id]"
            to: tb_project_id
          - from: "[fields]"
            to: fields
          - from: "[change_list]"
            to: change_list
  - key: tb_config_query
    http: true
    module: sql
    params:
      search:
        template: "{{ if .search}}%{{.search}}%{{ end}}"
    data_file: tb_config_query.sql
  - key: tb_config_detail_save
    http: true
    module: empty
    modify_config: tb_config_detail_modify.json
    params:
      tb_project_id:
        check:
          template: "{{must .tb_project_id}}"
          err_msg: "tb_project_id不能为空"
      schema_page_code_list:
        default: ["tb_config","tb_price"]
      op:
        default: ""
    handler_params:
      - key: service2field
        enable: "{{eq .op `gen_price`}}"
        service:
          service: autodesk.gen_tbj
          path: "[zbj_path]"
        save_field: gen_data
      - key: update_field
        enable: "{{eq .op `gen_price`}}"
        name: 更新字段
        fields:
          - field: zj_path
            template: "[gen_data.to_path]"
      - key: service2field
        name: 获取字段信息
        service:
          service: system.get_page_schema_field
          schema_page_code_list: "[schema_page_code_list]"
        save_field: schema_fields
      - key: to_tree
        name: 转成树，方便将map 转list
        foreach: "[schema_fields]"
        id: key
        pid: parent_key
        children: children
        save_field: schema_fields_tree
      - key: schema_transfer
        name: 转成树
        operation: "transfer"
        foreach: "[schema_fields_tree]"
        save_field: remote_data


      - key: schema_transfer
        name: "还原表单对象detail"
        enable: "{{eq .op `gen_doc`}}"
        operation: "restore"
        foreach: "[schema_fields]"
        field: "[remote_data]"
        save_field: detail
      - key: service2field
        name: 查询项目记录，填充项目经理
        enable: "{{must .detail.project_manager}}"
        service:
          service: hrm.user_list
          username: "[detail.project_manager]"
          to_obj: true
        save_field: project_manager

      - key: update_field
        name: 更新项目经理字段
        enable: "{{must .detail.project_manager}}"
        fields:
          - field: "[detail.project_manager_name]"
            template: "[project_manager.nick]"
      - key: service2field
        name: 查询数据中字段信息文档模板，然后需要更新前端传过来的
        enable: "{{eq .op `gen_doc`}}"
        service:
          service: autodesk.get_file_field_list
          tb_project_id: "[tb_project_id]"
        save_field: fileList

      - key: update_array_from_array
        name: 从数据中查询处理，更新为远程字段
        enable: "{{must .fileList}}"
        foreach: "[fileList]"
        item: item
        field: "[key]"
        right: "[remote_data]"
        right_field: "[key]"
        fields:
          - field: value
            template: "[right.value]"
      - key: render_doc
        name: 生成对于模板文件
        enable: "{{must .fileList}}"
        foreach: "[fileList]"
        field: "[detail]"
        save_field: file_remote_data


      - key: update_array_from_array
        name: 更新远程字段
        enable: "{{must .file_remote_data}}"
        foreach: "[remote_data]"
        item: item
        field: "[key]"
        right: "[file_remote_data]"
        right_field: "[link]"
        fields:
          - field: value
            template: "[right.link_value]"
      - key: prop_arr
        name: 查找更新的key
        foreach: "[remote_data]"
        value: "[key]"
        save_field: key_list
      - key: update_array
        name: 填充业务Id
        foreach: "[remote_data]"
        item: item
        fields:
          - field: tb_project_id
            template: "[tb_project_id]"
      - key: service2field
        name: 查询业务数据
        service:
          service: autodesk.tb_config_query
          tb_project_id: "[tb_project_id]"
          key_list: "[key_list]"
        save_field: local_data
      - key: get_modify_data
        save_field: change_list
      - key: filter_arr
        name: 过滤添加列表
        foreach: "[change_list]"
        item: item
        if_template: "{{eq .item.operation \"add\" }}"
        save_field: add_list
      - key: update_array
        enable: "{{must .add_list}}"
        foreach: "[add_list]"
        item: item
        fields:
          - field: tb_project_id
            template: "[tb_project_id]"
          - field: create_time
            template: "{{current_date_time}}"
          - field: tb_config_id
            template: "{{uuid}}"
          - field: create_user
            template: "{{.session_user_id}}"
          - field: order_index
            template: "[item.index]"
      - key: service2field
        enable: "{{must .add_list}}"
        service:
          service: autodesk.tb_config_bulk_create
          tb_config_list: "[add_list]"
      - key: filter_arr
        name: 过滤添加列表
        enable: "{{must .change_list}}"
        foreach: "[change_list]"
        item: item
        if_template: "{{eq .item.operation \"modify\" }}"
        save_field: update_list
      - key: service2field
        enable: "{{must .update_list}}"
        service:
          service: autodesk.tb_config_bulk_update
          tb_config_list: "[update_list]"
      - key: filter_arr
        name: 过滤添加列表
        enable: "{{must .change_list}}"
        foreach: "[change_list]"
        item: item
        if_template: "{{eq .item.operation \"remove\" }}"
        save_field: remove_list
      - key: prop_arr
        enable: "{{must .remove_list}}"
        foreach: "[remove_list]"
        value: "[tb_config_id]"
        save_field: tb_config_id_list
      - key: service2field
        enable: "{{must .remove_list}}"
        service:
          service: autodesk.tb_config_delete
          tb_config_id_list: "[tb_config_id_list]"

      - key: params2result
        fields:
          - from: "[change_list]"
            to: change_list
          - from: "[remote_data]"
            to: remote_data
          - from: "[local_data]"
            to: local_data
          - from: "[file_remote_data]"
            to: file_remote_data
          - from: "[detail]"
            to: detail
          - from: "[schema_fields]"
            to: schema_fields
  - key: tb_config_detail
    http: true
    module: empty
    params:
      tb_project_id:
        check:
          template: "{{must .tb_project_id}}"
          err_msg: "tb_project_id不能为空"
      schema_page_code_list:
        default: ["tb_config","tb_price"]
      project_manager:
        default: {}
    handler_params:
      - key: service2field
        service:
          service: system.get_page_schema_field
          schema_page_code_list: "[schema_page_code_list]"
        save_field: schema_fields
      - key: service2field
        service:
          service: autodesk.tb_config_query
          tb_project_id: "[tb_project_id]"
        save_field: result_data
      - key: schema_transfer
        operation: "restore"
        foreach: "[schema_fields]"
        field: "[result_data]"
        save_field: restore_result_data
      - key: service2field
        enable: "{{must .restore_result_data.project_manager}}"
        service:
          service: hrm.user_list
          username: "[restore_result_data.project_manager]"
          to_obj: true
        save_field: project_manager
      - key: update_field
        name: 更新字段
        fields:
          - field: "[restore_result_data.tb_project_id]"
            template: "[tb_project_id]"
          - field: "[restore_result_data.project_manager_name]"
            template: "[project_manager.nick]"
      - key: param2result
        field: "[restore_result_data]"

  - key: upload_tb_config
    module: empty
    http: true
    excel_config: "./config2excel.json"
    params:
      project:
        check:
          template: "{{must .project}}"
          err_msg: "项目不能为空"
    handler_params:
      - key: excel2data
        save_field: remote_tb_config_list
      - key: update_array
        foreach: "[remote_tb_config_list]"
        item: item
        fields:
          - field: project
            template: "{{ .project }}"
          - field: order_index
            template: "[item.order_index]"
            type: "int32"
      - key: service2field
        service:
          service: autodesk.tb_config_query
          project: "[project]"
        save_field: local_tb_config_list
      - key: update_array_from_array
        name: "根据username 更新操作，有修改，没有就新增"
        foreach: "[remote_tb_config_list]"
        item: item
        field: "[project&name]"
        right: "[local_tb_config_list]"
        right_field: "[project&name]"
        fields:
          - field: tb_config_id
            template: "[right.tb_config_id]"
      - key: filter_arr
        name: 过滤修改列表
        foreach: "[remote_tb_config_list]"
        item: item
        if_template: "{{must .item.tb_config_id}}"
        save_field: update_list
      - key: service2field
        name: 保存修改列表
        enable: "{{must .update_list}}"
        service:
          service: autodesk.tb_config_bulk_update
          tb_config_list: "[update_list]"
      - key: filter_arr
        name: 过滤新增
        foreach: "[remote_tb_config_list]"
        item: item
        if_template: "{{is_empty .item.tb_config_id}}"
        save_field: add_list

      - key: update_array
        name: 生成uuid
        enable: "{{must .add_list}}"
        foreach: "[add_list]"
        item: item
        fields:
          - field: tb_config_id
            template: "{{ uuid }}"
          - field: create_time
            template: "{{current_date_time}}"
      - key: service2field
        enable: "{{must .add_list}}"
        service:
          service: autodesk.tb_config_bulk_create
          tb_config_list: "[add_list]"
      - key: params2result
        fields:
          - from: "[update_list]"
            to: update_list
          - from: "[add_list]"
            to: add_list
  - key: tb_config_update_order_index
    http: true
    module: empty
    params:
      rows:
        check:
          template: "{{must .rows}}"
          err_msg: 排序记录不能为空
    handler_params:
      - key: update_array
        foreach: rows
        item: item
        fields:
          - field: order_index
            template: "[item.order_index]"
            type: "int32"

      - key: service2field
        service:
          service: autodesk.tb_config_bulk_update
          tb_config_list: "[rows]"
      - key: param2result
        field: "[rows]"
  - key: tb_config_bulk_update
    params:
      tb_config_list:
        check:
          template: "{{must .tb_config_list}}"
          err_msg: 记录不能为空
    table: tb_config
    module: bulk_upsert
    model_field: "[tb_config_list]"

  - key: tb_config_bulk_update_order_index

    params:
      tb_config_list:
        check:
          template: "{{must .tb_config_list}}"
          err_msg: 记录不能为空
    table: tb_config
    module: bulk_upsert
    update_fields:
      - order_index
    model_field: "[tb_config_list]"
  - key: tb_config_bulk_create
    params:
      tb_config_list:
        check:
          template: "{{must .tb_config_list}}"
          err_msg: 记录不能为空
    table: tb_config
    module: bulk_create
    model_field: "[tb_config_list]"
  - key: tb_config_download
    module: empty
    http: true
    excel_config: "./config2excel.json"
    params:
      excel_path:
        template: './template/{{current_date_format "20220202"}}/user_{{  replace (sub_str current_date_time -8 0) ":" ""}}_{{sub_str uuid -8 0}}.xlsx'
      response_name:
        default: "tb_config.xlsx"
      project:
        check:
          template: "{{must .project}}"
          err_msg: 所属项目不能为空
    handler_params:
      - key: service2field
        service:
          service: autodesk.tb_config_query
          project: "[project]"
        save_field: config_list
      - key: data2excel
        path: "[excel_path]"
      - key: file2result
        path: "[excel_path]"
        result_name: "[response_name]"

  - key: tb_config_update
    http: true
    module: model_update
    table: tb_config
    params:
      tb_config_id:
        check:
          template: "{{must .tb_config_id}}"
          err_msg: 记录不能为空
      key:
        check:
          template: "{{must .key}}"
          err_msg: 名称不能为空
      tb_project_id:
        check:
          template: "{{must .tb_project_id}}"
          err_msg: 所属项目不能为空
      order_index:
        type: "int32"
    handler_params:
      - key: service2field
        service:
          service: autodesk.tb_config_query
          exclude: "[tb_config_id]"
          key: "[key]"
          tb_project_id: "[tb_project_id]"
        save_field: tb
        template: "{{ eq (len .tb) 0}}"
        err_msg: "【{{.key}}】 已经存在"
    filter:
      tb_config_id: "[tb_config_id]"
  - key: tb_config_delete
    http: true
    module: model_delete
    table: tb_config
    params:
      tb_config_id_list:
        check:
          template: "{{must .tb_config_id_list}}"
          err_msg: 记录不能为空
    filter:
      tb_config_id__in: "[tb_config_id_list]"
  - key: tb_config_save
    http: true
    module: model_save
    table: tb_config
    params:
      tb_config_id:
        template: "{{uuid}}"
      key:
        check:
          template: "{{must .key}}"
          err_msg: 名称不能为空
      create_time:
        template: "{{current_date_time}}"
      create_user:
        template: "{{.session_user_id}}"
    handler_params:
      - key: service2field
        service:
          service: autodesk.tb_config_query
          key: "[key]"
          tb_project_id: "[tb_project_id]"
        save_field: tb
        template: "{{ eq (len .tb) 0}}"
        err_msg: "【{{.key}}】 已经存在"

  - key: get_tb_common
    http: true
    module: empty
    params:
      schema_page_code:
        template: "tb_common_config"
      belong_id:
        default: "common"
    handler_params:
      - key: service2field
        service:
          service: system.get_page_data_dict
        append_param: true
        save_field: data
      - key: param2result
        field: "[data]"

  - key: save_tb_common
    http: true
    module: empty
    params:
      belong_id:
        default: "common"
      schema_page_code:
        template: "tb_common_config"
    handler_params:
      - key: service2field
        service:
          service: system.save_page_data
        append_param: true
