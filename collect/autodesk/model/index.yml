#          - from: "[start]"
#            to: start
#          - from: "[status]"
#            to: status
#          - from: "[message_list]"
#            to: message_list


  - key: start_chart
    http: true
    module: http
    params:
      name:
        check:
          template: "{{must .name}}"
          err_msg: 名称不能为空
      feature:
        check:
          template: "{{must .feature}}"
          err_msg: 功能不能为空
        template: "{{replace .feature `\n` ``}}"
    http_json: start_chart.json
    success: "{{ if  .code  }}false{{ else }}true{{ end }}"
    result_handler:
      - key: result2params
        fields:
          - from: "[data]"
            to: "[data]"
      - key: param2result
        field: "[data]"
  - key: chart_status
    http: true
    log: true
    module: http
    params:
      chat_id:
        check:
          template: "{{must .chat_id}}"
          err_msg: 聊天ID不能为空
    http_json: chart_status.json
#    success: "{{ if  .code  }}false{{ else }}true{{ end }}"
    result_handler:
      - key: result2params
        fields:
          - from: "[data]"
            to: "[data]"
      - key: param2result
        field: "[data]"
  - key: message_list
    http: true
    module: http
    log: true
    params:
      chat_id:
        check:
          template: "{{must .chat_id}}"
          err_msg: 聊天ID不能为空
    http_json: message_list.json
    success: "{{ if  .code  }}false{{ else }}true{{ end }}"
    result_handler:
      - key: result2params
        fields:
          - from: "[data]"
            to: "[data]"
      - key: filter_arr
        foreach: "[data]"
        item: item
        if_template: "{{eq .item.type \"tool_response\" }}"
        save_field: data_tmp
        template: "{{must .data_tmp}}"
        err_msg: "{{to_json .data}}"
      - key: update_array
        foreach: "[data_tmp]"
        item: item
        fields:
          - field: content
            template: "[item.content]"
            type: json
      - key: arr2obj
        field: "[data_tmp]"
      - key: param2result
        field: "[data_tmp]"
