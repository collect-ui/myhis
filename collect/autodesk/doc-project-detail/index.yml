service:
  - key: doc_project_detail_msg
    http: true
    module: empty
    data_file: doc_project_detail_msg.json
    handler_params:
      - key: service2field
        service:
          service: autodesk.doc_project_detail_query
          has_group: true
        append_param: true
        save_field: msg_list
      - key: group_by
        enable: "{{must .msg_list}}"
        foreach: "[msg_list]"
        children: "children"
        append_item_param: true
        fields:
          - field: "[group]"
        save_field: msg_list
      - key: file2datajson
        save_original: true
        save_field: msg_list
      - key: param2result
        field: msg_list
  - key: doc_project_detail_query
    http: true
    module: sql
    params:
      search:
        template: "{{ if .search}}%{{.search}}%{{ end}}"
      to_obj:
        default: false
    data_file: doc_project_detail_query.sql
    result_handler:
      - key: arr2obj
        enable: "[to_obj]"

  - key: upload_doc_project_detail
    module: empty
    http: true
    excel_config: "./config2excel.json"
    params:
      tb_project_id:
        check:
          template: "{{must .tb_project_id}}"
          err_msg: "项目不能为空"
    handler_params:
      - key: service2field
        service:
          service: autodesk.doc_project_query
          tb_project_id: "[tb_project_id]"
          to_obj: true
        save_field: doc_project
        template: "{{must .doc_project}}"
        err_msg: "项目没有找到"
      - key: excel2data
        save_field: remote_doc_project_detail_list
      - key: update_array
        foreach: "[remote_doc_project_detail_list]"
        item: item
        fields:
          - field: doc_project_id
            template: "[doc_project.doc_project_id]"
          - field: tb_project_id
            template: "{{ .tb_project_id }}"
          - field: order_index
            template: "[item.order_index]"
            type: "int32"
      - key: service2field
        name: 保存修改列表
        enable: "{{must .remote_doc_project_detail_list}}"
        service:
          service: autodesk.doc_project_detail_bulk_update
          doc_project_detail_list: "[remote_doc_project_detail_list]"
      - key: param2result
        field: "remote_doc_project_detail_list"

  - key: doc_project_detail_update_order_index
    http: true
    module: empty
    params:
      rows:
        check:
          template: "{{must .rows}}"
          err_msg: 排序记录不能为空
    handler_params:
      - key: update_array
        foreach: rows
        item: item
        fields:
          - field: order_index
            template: "[item.order_index]"
            type: "int32"

      - key: service2field
        service:
          service: autodesk.doc_project_detail_bulk_update
          doc_project_detail_list: "[rows]"
      - key: param2result
        field: "[rows]"
  - key: doc_project_detail_bulk_update
    http: true
    params:
      doc_project_detail_list:
        check:
          template: "{{must .doc_project_detail_list}}"
          err_msg: 记录不能为空
    table: doc_project_detail
    module: bulk_upsert
    model_field: "[doc_project_detail_list]"

  - key: doc_project_detail_bulk_update_order_index

    params:
      doc_project_detail_list:
        check:
          template: "{{must .doc_project_detail_list}}"
          err_msg: 记录不能为空
    table: doc_project_detail
    module: bulk_upsert
    update_fields:
      - order_index
    model_field: "[doc_project_detail_list]"
  - key: doc_project_detail_bulk_create
    params:
      doc_project_detail_list:
        check:
          template: "{{must .doc_project_detail_list}}"
          err_msg: 记录不能为空
    table: doc_project_detail
    module: bulk_create
    model_field: "[doc_project_detail_list]"
  - key: doc_project_detail_folder_download
    module: empty
    http: true
    excel_config: "./config_folder2excel.json"
    params:
      excel_path:
        template: './template/{{current_date_format "2006-01-02"}}/user_{{  replace (sub_str current_date_time -8 0) ":" ""}}_{{sub_str uuid -8 0}}.xlsx'
      response_name:
        default: "doc_project_detail.xlsx"
      tb_project_id:
        check:
          template: "{{must .tb_project_id}}"
          err_msg: 所属项目不能为空
      download:
        default: false
    handler_params:
      - key: service2field
        service:
          service: autodesk.doc_project_detail_query_folder
          tb_project_id: "[tb_project_id]"
        save_field: config_list
      - key: data2excel
        path: "[excel_path]"
#      - key: file2result
#        enable: "[download]"
#        path: "[excel_path]"
#        result_name: "[response_name]"
      - key: param2result
        enable: "{{not .download}}"
        field: "[excel_path]"
  - key: doc_project_detail_query_folder
    http: true
    module: sql
    data_file: doc_project_detail_query_folder.sql
  - key: doc_project_detail_download
    module: empty
    http: true
    excel_config: "./config2excel.json"
    params:
      excel_path:
        template: './template/{{current_date_format "20220202"}}/user_{{  replace (sub_str current_date_time -8 0) ":" ""}}_{{sub_str uuid -8 0}}.xlsx'
      response_name:
        default: "doc_project_detail.xlsx"
      tb_project_id:
        check:
          template: "{{must .tb_project_id}}"
          err_msg: 所属项目不能为空
    handler_params:
      - key: service2field
        service:
          service: autodesk.doc_project_detail_query
          tb_project_id: "[tb_project_id]"
        save_field: config_list
      - key: data2excel
        path: "[excel_path]"
      - key: file2result
        path: "[excel_path]"
        result_name: "[response_name]"
  - key: doc_project_detail_update_content
    http: true
    module: empty
    params:
      doc_project_id:
        check:
          template: "{{must .doc_project_id}}"
          err_msg: 所属项目不能为空
      group:
        check:
          template: "{{must .group}}"
          err_msg: 所属组不能为空
      doc_content:
        default: ""
      topic:
        default: ""
      fields:
        default: ["*"]

    handler_params:
      - key: service2field
        service:
          service: autodesk.doc_project_content_query
          doc_project_id: "[doc_project_id]"
          group: "[group]"
          to_obj: true
        save_field: doc
      - key: service2field
        enable: "{{must .doc.doc_project_content_id}}"
        service:
          service: autodesk.doc_project_content_update
          doc_project_content_id: "[doc.doc_project_content_id]"
          doc_content: "[doc_content]"
          topic: "[topic]"
          fields: "[fields]"
      - key: service2field
        enable: "{{is_empty .doc.doc_project_content_id}}"
        service:
          service: autodesk.doc_project_content_create
          group: "[group]"
          doc_project_id: "[doc_project_id]"
          doc_content: "[doc_content]"
          topic: "[topic]"


  - key: doc_project_detail_update_content_bak
    http: true
    module: model_update
    table: doc_project_detail
    params:
      doc_project_detail_id:
        check:
          template: "{{must .doc_project_detail_id}}"
          err_msg: 记录不能为空
      doc_content:
        check:
          template: "{{must .doc_content}}"
          err_msg: 内容不能为空

    filter:
      doc_project_detail_id: "[doc_project_detail_id]"
  - key: doc_project_detail_update
    http: true
    module: model_update
    table: doc_project_detail
    params:
      doc_project_detail_id:
        check:
          template: "{{must .doc_project_detail_id}}"
          err_msg: 记录不能为空
      name:
        check:
          template: "{{must .name}}"
          err_msg: 名称不能为空
      order_index:
        type: "int32"
      group:
        type: "int32"
      topic:
        default: ""
      doc_content:
        default: ""
      fields:
        default: ["*"]
    filter:
      doc_project_detail_id: "[doc_project_detail_id]"
    result_handler:
      - key: service2field
        service:
          service: autodesk.doc_project_detail_query
          doc_project_detail_id: "[doc_project_detail_id]"
          to_obj: true
        save_field: record_data
        template: "{{must .record_data.doc_project_id}}"
        err_msg: 记录不存在
      - key: service2field
        enable: "{{or (must .doc_content) (must .group) (must .topic) }}"
        service:
          service: autodesk.doc_project_detail_update_content
          doc_project_id: "[record_data.doc_project_id]"
          group: "[group]"
          doc_content: "[doc_content]"
          topic: "[topic]"
          fields: "[fields]"
  - key: doc_project_detail_delete_by_doc_project_id
    http: true
    module: model_delete
    table: doc_project_detail
    params:
      doc_project_id_list:
        check:
          template: "{{must .doc_project_id_list}}"
          err_msg: 所属项目不能为空
    filter:
      doc_project_id__in: "[doc_project_id_list]"
  - key: doc_project_detail_delete
    http: true
    module: model_delete
    table: doc_project_detail
    params:
      doc_project_detail_id_list:
        check:
          template: "{{must .doc_project_detail_id_list}}"
          err_msg: 记录不能为空
    filter:
      doc_project_detail_id__in: "[doc_project_detail_id_list]"
  - key: doc_project_detail_save
    http: true
    module: model_save
    table: doc_project_detail
    log: true
    params:
      doc_project_detail_id:
        template: "{{uuid}}"
      name:
        check:
          template: "{{must .name}}"
          err_msg: 名称不能为空
      create_time:
        template: "{{current_date_time}}"
      create_user:
        template: "{{.session_user_id}}"

      tb_project_id:
        check:
          template: "{{must .tb_project_id}}"
          err_msg: 所属项目不能为空
    handler_params:
      - key: service2field
        name: 查询所属项目
        service:
          service: autodesk.doc_project_query
          tb_project_id: "[tb_project_id]"
          to_obj: true
        save_field: doc_project
        template: "{{must .doc_project}}"
        err_msg: 所属项目不存在
      - key: update_field
        name: 更新字段
        fields:
          - field: doc_project_id
            template: "[doc_project.doc_project_id]"
      - key: service2field
        name: 保存文档内容
        enable: "{{or (must .doc_content) (must .group) (must .topic) }}"
        service:
          service: autodesk.doc_project_detail_update_content
          doc_project_id: "[doc_project_id]"
          group: "[group]"
          doc_content: "[doc_content]"
          topic: "[topic]"


