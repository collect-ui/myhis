service:
  - key: img_detail
    http: true
    module: empty
    params:
      img_id:
        check:
          template: "{{must .img_id}}"
          err_msg: 图片不能为空
    handler_params:
      - key: service2field
        service:
          service: doc.img_query
          img_id: "[img_id]"
          to_obj: true
          with_content: true
        save_field: data
      - key: param2result
        field: "[data]"

  - key: img_query
    http: true
    module: sql
    params:
      search:
        template: "{{ if .search }}%{{.search}}%{{ end }}"
      nick:
        default: ""
      page:
        type: int
        default: 1
      size:
        default: 20
        type: int
      start:
        template: " ({{.page}}-1) * {{.size}}"
        exec: true
        type: int
      pagination:
        default: true
      count:
        default: true
      to_obj:
        default: false
    count: "[count]"
    count_file: count.sql
    data_file: img_query.sql
    pagination: pagination
    result_handler:
      - key: arr2obj
        enable: "[to_obj]"
  - key: img_save
    http: true
    module: model_save
    table: img
    params:
      img_id:
        template: "{{uuid_short}}"
      create_user:
        template: "{{.session_user_id}}"
      create_time:
        template: "{{current_date_time}}"
    handler_params:
      - key: update_field
        fields:
          - field: "local_path"
            template: "{{(get_key `local_file_dir`)}}/doc/img/{{sub_str .create_time 0 10}}/{{.img_id}}.png"
          - field: path
            template: "{{replace .local_path (get_key `local_file_dir`) (get_key `file_prefix`)}}"
      - key: "str2img"
        value: "[img]"
        path: "[local_path]"
  - key: img_update
    http: true
    module: model_update
    table: img
    params:
      img_id:
        check:
          template: "{{must .img_id}}"
          err_msg: 图片ID不能为空
    handler_params:
      - key: service2field
        service:
          service: doc.img_detail
          img_id: "[img_id]"
        save_field: detail
        template: "{{must .detail.img_id}}"
        err_msg: 图片不存在
      - key: update_field
        fields:
          - field: "local_path"
            template: "{{(get_key `local_file_dir`)}}/doc/img/{{sub_str .detail.create_time 0 10}}/{{.img_id}}.png"
          - field: path
            template: "{{replace .local_path (get_key `local_file_dir`) (get_key `file_prefix`)}}"
      - key: "str2img"
        value: "[img]"
        path: "[local_path]"
    filter:
      img_id: "[img_id]"
  - key: img_delete
    http: true
    module: model_delete
    params:
      img_id_list:
        check:
          template: "{{must .img_id_list}}"
          err_msg: 图片ID不能为空
    table: img
    filter:
      img_id__in: "[img_id_list]"









