service:
  - key: work_task_version_query
    http: true
    module: sql
    params:
      search:
        template: "{{ if .search }}%{{.search}}%{{end}}"
    data_file: work_task_version_query.sql

  - key: work_task_version_save
    http: true
    module: model_save
    params:
      work_task_version_id:
        template: "{{uuid}}"
      create_time:
        template: "{{current_date_time}}"
      create_user:
        template: "{{.session_user_id}}"
    table: work_task_version
  - key: work_task_version_update
    http: true
    module: model_update
    params:
      work_task_version_id:
        check:
          template: "{{must .work_task_version_id}}"
          err_msg: 记录不能为空
    table: work_task_version
    filter:
      work_task_version_id: "[work_task_version_id]"
  - key: work_task_version_delete
    http: true
    module: model_delete
    params:
      work_task_version_id_list:
        check:
          template: "{{must .work_task_version_id_list}}"
          err_msg: 记录不能为空
    table: work_task_version
    filter:
      work_task_version_id__in: "[work_task_version_id_list]"