  - key: tb_config_detail
    http: true
    module: bulk_service
    data_file: data/technical/service_transfer.json
    handler_params:
      - key: service2field
        service:
          service: frontend_autodesk.get_tb_config_detail_service
        save_field: service_list
    batch:
      foreach: "[service_list]"
      service:
        service: "[service]"
      append_item_param: true
      save_field: 'result'
    result_handler:
      - key: result2params
        fields:
          - to: "[result_list]"
      - key: arr2dict
        foreach: "[result_list]"
        field: "[target_field]"
        value: "[result.data]"
        save_field: result_data
      - key: param2result
        field: result_data
