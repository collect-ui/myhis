service:
  - key: mail_account_query
    http: true
    module: sql
    table: mail_account
    params:
      mail_account_id:
      email_name:
      email_name_list:
        default: []
      email_name_list_sql:
        default: ""
      search:
        template: "{{ if .search }}%{{.search}}%{{ end }}"
      page:
        type: int
        default: 1
      size:
        type: int
        default: 100
      start:
        template: " ({{.page}}-1) * {{.size}}"
        exec: true
        type: int
      pagination:
        default: true
      count:
        default: true
      to_obj:
        default: false
    data_file: query.sql
    count_file: count.sql
    pagination: pagination
    count: "[count]"
    result_handler:
      - key: arr2obj
        enable: "[to_obj]"

  - key: mail_account_bulk_create
    http: true
    module: bulk_create
    table: mail_account
    params:
      mail_account_list:
        check:
          template: "{{must .mail_account_list}}"
          err_msg: 邮箱列表不能为空
    handler_params:
      - key: update_array
        foreach: "[mail_account_list]"
        item: item
        fields:
          - field: mail_account_id
            template: "{{uuid}}"
          - field: is_current_running
            template: "0"
          - field: proton_registered
            template: "0"
          - field: proton_password
            template: "Zhangzhi@888"
          - field: create_time
            template: "{{current_date_time}}"
          - field: create_user
            template: "{{.session_user_id}}"
          - field: is_delete
            template: "0"
    model_field: "[mail_account_list]"

  - key: mail_account_update
    http: true
    module: model_update
    table: mail_account
    params:
      mail_account_id:
        check:
          template: "{{must .mail_account_id}}"
          err_msg: 邮箱记录ID不能为空
    filter:
      mail_account_id: "[mail_account_id]"

  - key: mail_account_clear_current_running
    module: model_update
    table: mail_account
    params:
      is_current_running:
        default: "0"
      current_run_mark_time:
        default: ""
    filter:
      is_current_running: "1"

  - key: mail_account_save_settings
    http: true
    module: empty
    params:
      mail_account_id:
        check:
          template: "{{must .mail_account_id}}"
          err_msg: 邮箱记录ID不能为空
      is_current_running:
        default: "0"
      is_disabled:
        default: "0"
      proton_registered:
        default: "0"
      proton_email:
        default: ""
      proton_password:
        default: "Zhangzhi@888"
      current_run_mark_time:
        template: "{{current_date_time}}"
      current_run_mark_time_for_save:
        default: ""
    handler_params:
      - key: update_field
        fields:
          - field: current_run_mark_time_for_save
            template: "{{if eq (printf \"%v\" .is_current_running) \"1\"}}{{.current_run_mark_time}}{{end}}"
      - key: service2field
        enable: "{{eq (printf \"%v\" .is_current_running) \"1\"}}"
        service:
          service: system.mail_account_clear_current_running
      - key: service2field
        service:
          service: system.mail_account_update
          mail_account_id: "[mail_account_id]"
          is_current_running: "[is_current_running]"
          is_disabled: "[is_disabled]"
          current_run_mark_time: "[current_run_mark_time_for_save]"
          proton_registered: "[proton_registered]"
          proton_email: "[proton_email]"
          proton_password: "[proton_password]"

  - key: mail_account_codex_device_code_http
    module: http
    http: true
    params:
      codex_domain:
        template: "{{if .codex_domain}}{{.codex_domain}}{{else}}{{if (get_key `codex_domain`)}}{{get_key `codex_domain`}}{{else}}auth.openai.com{{end}}{{end}}"
      codex_device_auth_url:
        template: "{{if .codex_device_auth_url}}{{.codex_device_auth_url}}{{else}}https://{{.codex_domain}}/api/accounts/deviceauth/usercode{{end}}"
      codex_client_id:
        template: "{{if .codex_client_id}}{{.codex_client_id}}{{else}}{{get_key `codex_client_id`}}{{end}}"
      codex_scope:
        template: "{{if .codex_scope}}{{.codex_scope}}{{else}}{{if (get_key `codex_scope`)}}{{get_key `codex_scope`}}{{else}}openid profile email offline_access{{end}}{{end}}"
      codex_login_hint:
        default: ""
    http_json: codex_device_auth.json
    success: "{{ if and .device_auth_id .user_code }}true{{ else }}false{{ end }}"

  - key: mail_account_codex_token_http
    module: http
    http: true
    params:
      codex_domain:
        template: "{{if .codex_domain}}{{.codex_domain}}{{else}}{{if (get_key `codex_domain`)}}{{get_key `codex_domain`}}{{else}}auth.openai.com{{end}}{{end}}"
      codex_device_auth_complete_url:
        template: "{{if .codex_device_auth_complete_url}}{{.codex_device_auth_complete_url}}{{else}}https://{{.codex_domain}}/api/accounts/deviceauth/token{{end}}"
      codex_client_id:
        template: "{{if .codex_client_id}}{{.codex_client_id}}{{else}}{{get_key `codex_client_id`}}{{end}}"
      device_auth_id:
        check:
          template: "{{must .device_auth_id}}"
          err_msg: device_auth_id不能为空
      user_code:
        check:
          template: "{{must .user_code}}"
          err_msg: user_code不能为空
    http_json: codex_device_auth_complete.json
    success: "{{ if and .authorization_code .code_verifier }}true{{ else }}false{{ end }}"

  - key: mail_account_codex_exchange_token_http
    module: http
    http: true
    params:
      codex_domain:
        template: "{{if .codex_domain}}{{.codex_domain}}{{else}}{{if (get_key `codex_domain`)}}{{get_key `codex_domain`}}{{else}}auth.openai.com{{end}}{{end}}"
      codex_token_url:
        template: "{{if .codex_token_url}}{{.codex_token_url}}{{else}}https://{{.codex_domain}}/oauth/token{{end}}"
      codex_client_id:
        template: "{{if .codex_client_id}}{{.codex_client_id}}{{else}}{{get_key `codex_client_id`}}{{end}}"
      redirect_uri:
        template: "{{if .redirect_uri}}{{.redirect_uri}}{{else}}https://{{.codex_domain}}/deviceauth/callback{{end}}"
      authorization_code:
        check:
          template: "{{must .authorization_code}}"
          err_msg: authorization_code不能为空
      code_verifier:
        check:
          template: "{{must .code_verifier}}"
          err_msg: code_verifier不能为空
    http_json: codex_token_exchange.json
    success: "{{ if or .access_token .refresh_token }}true{{ else }}false{{ end }}"

  - key: mail_account_codex_refresh_token_http
    module: http
    http: true
    params:
      codex_domain:
        template: "{{if .codex_domain}}{{.codex_domain}}{{else}}{{if (get_key `codex_domain`)}}{{get_key `codex_domain`}}{{else}}auth.openai.com{{end}}{{end}}"
      codex_token_url:
        template: "{{if .codex_token_url}}{{.codex_token_url}}{{else}}https://{{.codex_domain}}/oauth/token{{end}}"
      codex_client_id:
        template: "{{if .codex_client_id}}{{.codex_client_id}}{{else}}{{get_key `codex_client_id`}}{{end}}"
      refresh_token:
        check:
          template: "{{must .refresh_token}}"
          err_msg: refresh_token不能为空
    http_json: codex_token_refresh.json
    success: "{{ if .access_token }}true{{ else }}false{{ end }}"

  - key: mail_account_codex_usage_http
    module: http
    http: true
    params:
      codex_usage_url:
        template: "{{if .codex_usage_url}}{{.codex_usage_url}}{{else}}https://chatgpt.com/backend-api/wham/usage{{end}}"
      access_token:
        check:
          template: "{{must .access_token}}"
          err_msg: access_token不能为空
      account_id:
        default: ""
    http_json: codex_usage.json
    success: "{{ if .plan_type }}true{{ else }}{{if .user_id}}true{{else}}false{{end}}{{ end }}"

  - key: mail_account_codex_generate_and_save
    http: true
    module: empty
    params:
      mail_account_id:
        check:
          template: "{{must .mail_account_id}}"
          err_msg: 邮箱记录ID不能为空
      codex_domain:
        template: "{{if .codex_domain}}{{.codex_domain}}{{else}}{{if (get_key `codex_domain`)}}{{get_key `codex_domain`}}{{else}}auth.openai.com{{end}}{{end}}"
      codex_scope:
        default: "openid profile email offline_access"
    handler_params:
      - key: service2field
        service:
          service: system.mail_account_query
          mail_account_id: "[mail_account_id]"
          to_obj: true
          pagination: false
          count: false
        save_field: current_mail_account
      - key: service2field
        service:
          service: system.mail_account_codex_device_code_http
          codex_login_hint: "[current_mail_account.email_name]"
          codex_scope: "[codex_scope]"
        save_field: codex_device_auth_data
      - key: update_field
        fields:
          - field: codex_device_auth_id
            template: "{{if .codex_device_auth_data.device_auth_id}}{{.codex_device_auth_data.device_auth_id}}{{end}}"
          - field: codex_device_code
            template: "{{if .codex_device_auth_data.device_auth_id}}{{.codex_device_auth_data.device_auth_id}}{{end}}"
          - field: codex_user_code
            template: "{{if .codex_device_auth_data.user_code}}{{.codex_device_auth_data.user_code}}{{end}}"
          - field: codex_verification_uri
            template: "https://{{.codex_domain}}/codex/device"
          - field: codex_verification_uri_complete
            template: "https://{{.codex_domain}}/codex/device"
          - field: codex_interval
            template: "{{if .codex_device_auth_data.interval}}{{.codex_device_auth_data.interval}}{{end}}"
          - field: codex_expires_in
            template: "{{if .codex_device_auth_data.expires_at}}{{.codex_device_auth_data.expires_at}}{{end}}"
          - field: codex_scope
            template: "{{if .codex_device_auth_data.scope}}{{.codex_device_auth_data.scope}}{{else}}{{.codex_scope}}{{end}}"
          - field: codex_auth_status
            template: "device_code_generated"
          - field: codex_auth_msg
            template: "{{if .codex_device_auth_data.message}}{{.codex_device_auth_data.message}}{{else}}请在浏览器完成授权后点击回填Token{{end}}"
          - field: codex_last_auth_time
            template: "{{current_date_time}}"
          - field: codex_auth_json
            template: "{\"device_auth_id\":\"{{if .codex_device_auth_data.device_auth_id}}{{.codex_device_auth_data.device_auth_id}}{{end}}\",\"user_code\":\"{{if .codex_device_auth_data.user_code}}{{.codex_device_auth_data.user_code}}{{end}}\",\"verification_uri\":\"https://{{.codex_domain}}/codex/device\",\"interval\":\"{{if .codex_device_auth_data.interval}}{{.codex_device_auth_data.interval}}{{end}}\",\"expires_at\":\"{{if .codex_device_auth_data.expires_at}}{{.codex_device_auth_data.expires_at}}{{end}}\",\"scope\":\"{{if .codex_device_auth_data.scope}}{{.codex_device_auth_data.scope}}{{else}}{{.codex_scope}}{{end}}\"}"
      - key: service2field
        service:
          service: system.mail_account_update
          mail_account_id: "[mail_account_id]"
          codex_device_auth_id: "[codex_device_auth_id]"
          codex_device_code: "[codex_device_code]"
          codex_user_code: "[codex_user_code]"
          codex_verification_uri: "[codex_verification_uri]"
          codex_verification_uri_complete: "[codex_verification_uri_complete]"
          codex_interval: "[codex_interval]"
          codex_expires_in: "[codex_expires_in]"
          codex_scope: "[codex_scope]"
          codex_auth_status: "[codex_auth_status]"
          codex_auth_msg: "[codex_auth_msg]"
          codex_last_auth_time: "[codex_last_auth_time]"
          codex_auth_json: "[codex_auth_json]"
      - key: params2result
        fields:
          - from: "[codex_device_auth_data]"
            to: codex_device_auth_data
          - from: "[codex_device_auth_id]"
            to: codex_device_auth_id
          - from: "[codex_device_code]"
            to: codex_device_code
          - from: "[codex_user_code]"
            to: codex_user_code
          - from: "[codex_verification_uri]"
            to: codex_verification_uri
          - from: "[codex_verification_uri_complete]"
            to: codex_verification_uri_complete
          - from: "[codex_interval]"
            to: codex_interval
          - from: "[codex_expires_in]"
            to: codex_expires_in
          - from: "[codex_scope]"
            to: codex_scope
          - from: "[codex_auth_status]"
            to: codex_auth_status
          - from: "[codex_auth_msg]"
            to: codex_auth_msg

  - key: mail_account_codex_query_usage_and_save
    http: true
    module: empty
    params:
      mail_account_id:
        check:
          template: "{{must .mail_account_id}}"
          err_msg: 邮箱记录ID不能为空
      try_backfill_token:
        default: false
      try_refresh_token:
        default: true
    handler_params:
      - key: service2field
        service:
          service: system.mail_account_query
          mail_account_id: "[mail_account_id]"
          to_obj: true
          pagination: false
          count: false
        save_field: current_mail_account
      - key: service2field
        enable: "{{and (eq (printf \"%v\" .try_backfill_token) \"true\") (eq (printf \"%v\" .current_mail_account.codex_access_token) \"\") (ne (printf \"%v\" .current_mail_account.codex_device_auth_id) \"\") (ne (printf \"%v\" .current_mail_account.codex_user_code) \"\")}}"
        service:
          service: system.mail_account_codex_backfill_token
          mail_account_id: "[mail_account_id]"
      - key: service2field
        enable: "{{eq (printf \"%v\" .try_backfill_token) \"true\"}}"
        service:
          service: system.mail_account_query
          mail_account_id: "[mail_account_id]"
          to_obj: true
          pagination: false
          count: false
        save_field: current_mail_account
      - key: service2field
        enable: "{{and (eq (printf \"%v\" .try_refresh_token) \"true\") (ne (printf \"%v\" .current_mail_account.codex_refresh_token) \"\")}}"
        service:
          service: system.mail_account_codex_refresh_and_save
          mail_account_id: "[mail_account_id]"
      - key: service2field
        enable: "{{eq (printf \"%v\" .try_refresh_token) \"true\"}}"
        service:
          service: system.mail_account_query
          mail_account_id: "[mail_account_id]"
          to_obj: true
          pagination: false
          count: false
        save_field: current_mail_account
      - key: check_field
        fields:
          - field: "[current_mail_account.codex_access_token]"
            template: "{{must .current_mail_account.codex_access_token}}"
            err_msg: access_token为空，请先生成并回填Token后再查询用量
      - key: service2field
        service:
          service: system.mail_account_codex_usage_http
          access_token: "[current_mail_account.codex_access_token]"
          account_id: "[current_mail_account.codex_account_id]"
        save_field: codex_usage_data
      - key: update_field
        fields:
          - field: codex_usage_json
            template: "{{to_json .codex_usage_data}}"
          - field: codex_usage_plan_type
            template: "{{if .codex_usage_data.plan_type}}{{.codex_usage_data.plan_type}}{{else}}{{.current_mail_account.codex_usage_plan_type}}{{end}}"
          - field: codex_usage_allowed
            template: "{{if .codex_usage_data.rate_limit}}{{if .codex_usage_data.rate_limit.allowed}}{{.codex_usage_data.rate_limit.allowed}}{{else}}false{{end}}{{else}}{{.current_mail_account.codex_usage_allowed}}{{end}}"
          - field: codex_usage_limit_reached
            template: "{{if .codex_usage_data.rate_limit}}{{if .codex_usage_data.rate_limit.limit_reached}}{{.codex_usage_data.rate_limit.limit_reached}}{{else}}false{{end}}{{else}}{{.current_mail_account.codex_usage_limit_reached}}{{end}}"
          - field: codex_usage_used_percent
            template: "{{if .codex_usage_data.rate_limit}}{{if .codex_usage_data.rate_limit.primary_window}}{{.codex_usage_data.rate_limit.primary_window.used_percent}}{{else}}{{.current_mail_account.codex_usage_used_percent}}{{end}}{{else}}{{.current_mail_account.codex_usage_used_percent}}{{end}}"
          - field: codex_usage_reset_at
            template: "{{if .codex_usage_data.rate_limit}}{{if .codex_usage_data.rate_limit.primary_window}}{{.codex_usage_data.rate_limit.primary_window.reset_at}}{{else}}{{.current_mail_account.codex_usage_reset_at}}{{end}}{{else}}{{.current_mail_account.codex_usage_reset_at}}{{end}}"
          - field: codex_usage_last_query_time
            template: "{{current_date_time}}"
          - field: codex_usage_msg
            template: "{{if .codex_usage_data.rate_limit_reached_type}}{{.codex_usage_data.rate_limit_reached_type.type}}{{else}}usage_query_ok{{end}}"
      - key: service2field
        service:
          service: system.mail_account_update
          mail_account_id: "[mail_account_id]"
          codex_usage_json: "[codex_usage_json]"
          codex_usage_plan_type: "[codex_usage_plan_type]"
          codex_usage_allowed: "[codex_usage_allowed]"
          codex_usage_limit_reached: "[codex_usage_limit_reached]"
          codex_usage_used_percent: "[codex_usage_used_percent]"
          codex_usage_reset_at: "[codex_usage_reset_at]"
          codex_usage_last_query_time: "[codex_usage_last_query_time]"
          codex_usage_msg: "[codex_usage_msg]"
      - key: params2result
        fields:
          - from: "[codex_usage_data]"
            to: codex_usage_data
          - from: "[codex_usage_plan_type]"
            to: codex_usage_plan_type
          - from: "[codex_usage_allowed]"
            to: codex_usage_allowed
          - from: "[codex_usage_limit_reached]"
            to: codex_usage_limit_reached
          - from: "[codex_usage_used_percent]"
            to: codex_usage_used_percent
          - from: "[codex_usage_reset_at]"
            to: codex_usage_reset_at
          - from: "[codex_usage_last_query_time]"
            to: codex_usage_last_query_time
          - from: "[codex_usage_msg]"
            to: codex_usage_msg

  - key: mail_account_codex_refresh_and_save
    http: true
    module: empty
    params:
      mail_account_id:
        check:
          template: "{{must .mail_account_id}}"
          err_msg: 邮箱记录ID不能为空
    handler_params:
      - key: service2field
        service:
          service: system.mail_account_query
          mail_account_id: "[mail_account_id]"
          to_obj: true
          pagination: false
          count: false
        save_field: current_mail_account
      - key: check_field
        fields:
          - field: "[current_mail_account.codex_refresh_token]"
            template: "{{must .current_mail_account.codex_refresh_token}}"
            err_msg: refresh_token为空，请重新完成登录授权
      - key: service2field
        service:
          service: system.mail_account_codex_refresh_token_http
          refresh_token: "[current_mail_account.codex_refresh_token]"
        save_field: codex_token_data
      - key: update_field
        fields:
          - field: codex_access_token
            template: "{{if .codex_token_data.access_token}}{{.codex_token_data.access_token}}{{else}}{{.current_mail_account.codex_access_token}}{{end}}"
          - field: codex_refresh_token
            template: "{{if .codex_token_data.refresh_token}}{{.codex_token_data.refresh_token}}{{else}}{{.current_mail_account.codex_refresh_token}}{{end}}"
          - field: codex_id_token
            template: "{{if .codex_token_data.id_token}}{{.codex_token_data.id_token}}{{else}}{{.current_mail_account.codex_id_token}}{{end}}"
          - field: codex_token_type
            template: "{{if .codex_token_data.token_type}}{{.codex_token_data.token_type}}{{else}}{{.current_mail_account.codex_token_type}}{{end}}"
          - field: codex_scope
            template: "{{if .codex_token_data.scope}}{{.codex_token_data.scope}}{{else}}{{.current_mail_account.codex_scope}}{{end}}"
          - field: codex_expires_in
            template: "{{if .codex_token_data.expires_in}}{{.codex_token_data.expires_in}}{{else}}{{.current_mail_account.codex_expires_in}}{{end}}"
          - field: codex_account_id
            template: "{{if .codex_token_data.account_id}}{{.codex_token_data.account_id}}{{else}}{{if (jwt_claim .codex_token_data.access_token \"https://api.openai.com/auth->chatgpt_account_id\")}}{{jwt_claim .codex_token_data.access_token \"https://api.openai.com/auth->chatgpt_account_id\"}}{{else}}{{if (jwt_claim .codex_token_data.id_token \"https://api.openai.com/auth->chatgpt_account_id\")}}{{jwt_claim .codex_token_data.id_token \"https://api.openai.com/auth->chatgpt_account_id\"}}{{else}}{{.current_mail_account.codex_account_id}}{{end}}{{end}}{{end}}"
          - field: codex_expires_at
            template: "{{if .codex_token_data.expires_at}}{{.codex_token_data.expires_at}}{{else}}{{.current_mail_account.codex_expires_at}}{{end}}"
          - field: codex_auth_status
            template: "{{if .codex_token_data.error}}{{if (str_contains (printf \"%v\" .codex_token_data.error.code) \"refresh_token_reused\")}}need_relogin{{else}}token_refresh_error{{end}}{{else}}token_refreshed{{end}}"
          - field: codex_auth_msg
            template: "{{if .codex_token_data.error}}{{.codex_token_data.error.message}}{{else if .codex_token_data.message}}{{.codex_token_data.message}}{{else}}Token刷新完成{{end}}"
          - field: codex_last_auth_time
            template: "{{current_date_time}}"
          - field: codex_auth_json
