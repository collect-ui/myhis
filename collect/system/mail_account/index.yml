  - key: mail_account_codex_apply_local_auth
    http: true
    module: empty
    params:
      mail_account_id:
        check:
          template: "{{must .mail_account_id}}"
          err_msg: 邮箱记录ID不能为空
      target_auth_path:
        default: "~/.codex/auth.json"
      backup:
        default: false
    handler_params:
      - key: service2field
        service:
          service: system.mail_account_query
          mail_account_id: "[mail_account_id]"
          to_obj: true
          pagination: false
          count: false
        save_field: current_mail_account
      - key: check_field
        fields:
          - field: "[current_mail_account.codex_access_token]"
            template: "{{must .current_mail_account.codex_access_token}}"
            err_msg: access_token 为空，请先完成 Token 回填
          - field: "[current_mail_account.codex_refresh_token]"
            template: "{{must .current_mail_account.codex_refresh_token}}"
            err_msg: refresh_token 为空，请先完成 Token 回填
          - field: "[current_mail_account.codex_id_token]"
            template: "{{must .current_mail_account.codex_id_token}}"
            err_msg: id_token 为空，请先完成 Token 回填
          - field: "[current_mail_account.codex_account_id]"
            template: "{{must .current_mail_account.codex_account_id}}"
            err_msg: account_id 为空，请先完成 Token 回填
      - key: update_field
        fields:
          - field: auth_json_content
            template: |
              {
                "auth_mode": "chatgpt",
                "OPENAI_API_KEY": null,
                "tokens": {
                  "id_token": {{to_json .current_mail_account.codex_id_token}},
                  "access_token": {{to_json .current_mail_account.codex_access_token}},
                  "refresh_token": {{to_json .current_mail_account.codex_refresh_token}},
                  "account_id": {{to_json .current_mail_account.codex_account_id}}
                },
                "last_refresh": "{{current_date_format "2006-01-02T15:04:05.000000000Z07:00"}}"
              }
      - key: local_file_write
        field: "[target_auth_path]"
        value: "[auth_json_content]"
        save_field: auth_file_write_result
      - key: update_field
        fields:
          - field: codex_auth_msg
            template: "已应用到本地 ~/.codex/auth.json"
          - field: codex_last_auth_time
            template: "{{current_date_time}}"
      - key: service2field
        service:
          service: system.mail_account_update
          mail_account_id: "[mail_account_id]"
          codex_auth_msg: "[codex_auth_msg]"
          codex_last_auth_time: "[codex_last_auth_time]"
      - key: params2result
        fields:
          - from: "[auth_file_write_result.target_path]"
            to: target_path
          - from: "[auth_file_write_result.backup_path]"
            to: backup_path
          - from: "[auth_file_write_result.bytes]"
            to: bytes
          - from: "[auth_file_write_result.updated_at]"
            to: updated_at
          - from: "[target_auth_path]"
            to: target_auth_path

  - key: mail_account_codex_query_usage_all_and_save
    http: true
    module: bulk_service
    params:
      email_name_list:
        default: []
      all_mail_account_list:
        default: []
      mail_account_list:
        default: []
      result_list:
        default: []
      success_list:
        default: []
      fail_list:
        default: []
      total_count:
        default: 0
      success_count:
        default: 0
      fail_count:
        default: 0
    handler_params:
      - key: service2field
        service:
          service: system.mail_account_query
          email_name_list: "[email_name_list]"
          pagination: false
          count: false
        save_field: all_mail_account_list
      - key: filter_arr
        foreach: "[all_mail_account_list]"
        item: item
        if_template: "{{and (ne (printf \"%v\" .item.codex_account_id) \"\") (ne (printf \"%v\" .item.codex_access_token) \"\") (ne (printf \"%v\" .item.codex_auth_status) \"need_relogin\") (ne .item.is_disabled \"1\")}}"
        save_field: mail_account_list
    batch:
      loop_max: 1
      foreach: "[mail_account_list]"
      service:
        service: system.mail_account_codex_query_usage_and_save
        mail_account_id: "[mail_account_id]"
        try_backfill_token: false
      append_item_param: true
      save_field: result
    result_handler:
      - key: result2params
        fields:
          - to: "[result_list]"
      - key: filter_arr
        foreach: "[result_list]"
        item: item
        if_template: "{{eq (printf \"%v\" .item.result.Success) \"true\"}}"
        save_field: success_list
      - key: filter_arr
        foreach: "[result_list]"
        item: item
        if_template: "{{ne (printf \"%v\" .item.result.Success) \"true\"}}"
        save_field: fail_list
      - key: filter_arr
        foreach: "[fail_list]"
        item: item
        if_template: "{{str_contains (printf \"%v\" .item.result.Msg) \"refresh_token_reused\"}}"
        save_field: need_relogin_list
      - key: update_array
        foreach: "[need_relogin_list]"
        item: item
        fields:
          - field: err_msg
            template: "{{.item.result.Msg}}"
      - key: service2field
        enable: "{{must .need_relogin_list}}"
        service:
          service: system.mail_account_codex_mark_need_relogin_batch
          need_relogin_list: "[need_relogin_list]"
      - key: update_field
        fields:
          - field: total_count
            template: "{{len .mail_account_list}}"
          - field: success_count
            template: "{{len .success_list}}"
          - field: fail_count
            template: "{{len .fail_list}}"
      - key: params2result
        fields:
          - from: "[total_count]"
            to: total_count
          - from: "[success_count]"
            to: success_count
          - from: "[fail_count]"
            to: fail_count
          - from: "[fail_list]"
            to: fail_list
          - from: "[result_list]"
            to: result_list

