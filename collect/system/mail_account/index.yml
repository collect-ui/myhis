      - key: filter_arr
        foreach: "[mail_account_list]"
        item: item
        if_template: "{{eq (printf \"%v\" .item.exists) \"1\"}}"
        save_field: skip_list
      - key: filter_arr
        foreach: "[mail_account_list]"
        item: item
        if_template: "{{ne (printf \"%v\" .item.exists) \"1\"}}"
