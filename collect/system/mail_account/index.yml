        default: []
      mark_total:
        default: 0
    batch:
      loop_max: 1
      foreach: "[need_relogin_list]"
      service:
        service: system.mail_account_update
        mail_account_id: "[mail_account_id]"
        codex_auth_status: "need_relogin"
        codex_auth_msg: "[err_msg]"
        codex_last_auth_time: "{{current_date_time}}"
      append_item_param: true
    result_handler:
      - key: update_field
        fields:
          - field: mark_total
            template: "{{len .need_relogin_list}}"
      - key: params2result
        fields:
          - from: "[mark_total]"
            to: mark_total

  - key: mail_account_delete
    http: true
    module: model_delete
    table: mail_account
    params:
      mail_account_id_list:
        check:
          template: "{{must .mail_account_id_list}}"
          err_msg: 请选择要删除的邮箱记录
    filter:
      mail_account_id__in: "[mail_account_id_list]"
