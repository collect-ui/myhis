service:
  - key: get_role_menu_id_list
    http: true
    module: empty
    params:
      role_id:
        check:
          template: "{{must .role_id}}"
          err_msg: 角色不能为空
      menu_id_list:
        default: []
    handler_params:
      - key: service2field
        service:
          service: system.role_menu_query
          role_id: "[role_id]"
        save_field: menu_list
      - key: prop_arr
        name: 获取菜单Id
        enable: "{{gt (len .menu_list) 0}}"
        foreach: "[menu_list]"
        value: "[sys_menu_id]"
        save_field: menu_id_list
      - key: param2result
        field: "[menu_id_list]"
  - key: role_menu_query
    http: true
    module: sql
    data_file: role_menu_query.sql
    params:
      belong_project:
        template: "{{get_key `project`}}"

  - key: role_menu_save_bulk_by_menu
    http: true
    module: empty
    modify_config: menu_modify.json
    log: true
    params:
      role_id:
        check:
          template: "{{must .role_id}}"
          err_msg: 角色不能为空
      menu_id_list:
        default: []
      loca_menu_id_list:
        default: []
      belong_project:
        template: "{{get_key `project`}}"

    handler_params:
      - key: service2field
        name: 获取现有菜单
        service:
          service: system.role_menu_query
          role_id: "[role_id]"
        save_field: local_menu_list
      - key: prop_arr
        name: 获取菜单Id
        enable: "{{must .local_menu_list}}"
        foreach: "[local_menu_list]"
        value: "[sys_menu_id]"
        save_field: local_menu_id_list

      - key: get_modify_data
        name: 对比
        save_field: change_list
      - key: filter_arr
        name: 过滤新增数组
        enable: "{{must .change_list}}"
        foreach: "[change_list]"
        item: item
        if_template: "{{eq .item.operation `add`}}"
        save_field: add_list
      - key: filter_arr
        name: 过滤新增数组
        enable: "{{must .change_list}}"
        foreach: "[change_list]"
        item: item
        if_template: "{{eq .item.operation `remove`}}"
        save_field: remove_list
      - key: prop_arr
        name: "获取id"
        enable: "{{must .remove_list }}"
        foreach: "[remove_list]"
        value: "[before]"
        save_field: remove_sys_menu_id_list
      - key: update_array
        enable: "{{must .add_list}}"
        name: 更新字段
        foreach: "[add_list]"
        item: item
        fields:
          - field: role_menu_id
            template: "{{uuid}}"
          - field: role_id
            template: "[role_id]"
          - field: belong_project
            template: "[belong_project]"
          - field: sys_menu_id
            template: "[item.after]"
      - key: service2field
        enable: "{{must .add_list}}"
        service:
          service: system.role_menu_save_bulk
          role_menu_list: "[add_list]"
      - key: service2field
        enable: "{{must .remove_sys_menu_id_list}}"
        service:
          service: system.role_menu_delete_by_role
          role_id: "[role_id]"
          sys_menu_id_list: "[remove_sys_menu_id_list]"
      - key: params2result
        fields:
          - from: "[change_list]"
            to: change_list
  - key: role_menu_save_bulk
    module: bulk_create
    table: "role_menu"
    params:
      role_menu_list:
        check:
          template: "{{must .role_menu_list}}"
          err_msg: "角色不能微控"
      belong_project:
        template: "{{get_key `project`}}"
    handler_params:
      - key: update_array
        foreach: "[role_menu_list]"
        item: item
        fields:
          - field: belong_project
            template: "[belong_project]"

    model_field: "[role_menu_list]"
  - key: role_menu_delete
    module: model_delete
    table: "role_menu"
    params:
      role_id_list:
        check:
          template: "{{must .role_id_list}}"
          err_msg: "角色不能为空"
      sys_menu_id:
        check:
          template: "{{must .sys_menu_id}}"
          err_msg: "菜单不能为空"
    filter:
      role_id__in: "[role_id_list]"
      sys_menu_id: "[sys_menu_id]"
  - key: role_menu_delete_by_role
    module: model_delete
    table: "role_menu"
    params:
      role_id:
        check:
          template: "{{must .role_id}}"
          err_msg: "角色不能为空"
      sys_menu_id_list:
        check:
          template: "{{must .sys_menu_id_list}}"
          err_msg: "菜单不能为空"
    filter:
      role_id: "[role_id]"
      sys_menu_id__in: "[sys_menu_id_list]"