service:
  - key: registration_save
    http: true
    module: model_save
    must_login: false
    table: registration
    params:
      registration_id:
        template: "{{uuid}}"
      username:
        check:
          template: "{{must .username}}"
          err_msg: "用户名不能为空"
      company:
        check:
          template: "{{must .company}}"
          err_msg: "公司名称不能为空"
      phone:
        check:
          template: "{{must .phone}}"
          err_msg: "手机号不能为空"
      status:
        default: "pending"
      create_time:
        template: "{{current_date_time}}"
      modify_user:
        template: "{{.session_user_id}}"
      modify_time:
        template: "{{current_date_time}}"
      status_list:
        default: ["success","pending"]
    handler_params:
      - key: service2field
        service:
          service: system.registration_query
          username: "[username]"
          status_list: "[status_list]"
        save_field: registration_list
        template: "{{eq (len .registration_list) 0}}"
        err_msg: "账号【{{.username}}】已经注册"
      - key: service2field
        service:
          service: hrm.user_list
          username: "[username]"
        save_field: user_list
        template: "{{eq (len .user_list) 0}}"
        err_msg: "账号【{{.username}}】已经存在"

  - key: registration_update
    http: true
    module: model_update
    table: registration
    params:
      registration_id:
        check:
          template: "{{must .registration_id}}"
          err_msg: "注册ID不能为空"

    filter:
      registration_id: "[registration_id]"

  - key: registration_confirm
    http: true
    module: empty
    params:
      registration_id:
        check:
          template: "{{must .registration_id}}"
          err_msg: 注册信息不能为空
    handler_params:
      - key: service2field
        service:
          service: system.registration_query
          registration_id: "[registration_id]"
          to_obj: true
        save_field: registration
      - key: service2field
        service:
          service: hrm.create_user_flow
          username: "[registration.username]"
          password: "[registration.password]"
          nick: "[registration.nick]"
          company: "[registration.company]"
          phone: "[registration.phone]"
          status: "normal"
          role_id_list: ["company"]
      - key: service2field
        service:
          service: system.registration_update
          registration_id: "[registration_id]"
          status: "success"

  - key: registration_delete
    http: true
    module: model_delete
    table: registration
    params:
      registration_id_list:
        check:
          template: "{{must .registration_id_list}}"
          err_msg: "请选择要删除的注册记录"
      is_delete:
    filter:
      registration_id__in: "[registration_id_list]"

  - key: registration_query
    http: true
    module: sql
    table: registration
    params:
      search:
        template: "{{ if .search }}%{{.search}}%{{ end }}"
      page:
        type: int
        default: 1
      size:
        default: 20
        type: int
      start:
        template: " ({{.page}}-1) * {{.size}}"
        exec: true
        type: int
      pagination:
        default: true
      to_obj:
        default: false
    data_file: registration_query.sql
    count_file: registration_count.sql
    pagination: pagination
    result_handler:

      - key: arr2obj
        enable: "[to_obj]"