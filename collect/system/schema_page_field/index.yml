service:
  - key: page_schema_field_import
    module: empty
    http: true
    excel_config: "./field2excel.json"
    params:
      schema_page_code:
        check:
          template: "{{must .schema_page_code}}"
          err_msg: 编号不能为空
    handler_params:
      - key: excel2data
        save_field: remote_field_list
      - key: service2field
        service:
          service: system.get_page_schema_field
        append_param: true
        save_field: local_field_list
      - key: update_array_from_array
        name: "根据schema_page_code 和key 更新操作，有修改，没有就新增"
        foreach: "[remote_field_list]"
        item: item
        field: "[schema_page_code&key]"
        right: "[local_field_list]"
        right_field: "[schema_page_code&key]"
        fields:
          - field: schema_page_field_id
            template: "[right.schema_page_field_id]"
      - key: filter_arr
        name: 过滤修改列表
        foreach: "[remote_field_list]"
        item: item
        if_template: "{{must .item.schema_page_field_id}}"
        save_field: update_list
      - key: service2field
        name: 保存修改列表
        enable: "{{must .update_list}}"
        service:
          service: system.page_schema_field_update_data_bulk
          field_list: "[update_list]"
      - key: filter_arr
        name: 过滤新增
        foreach: "[remote_field_list]"
        item: item
        if_template: "{{is_empty .item.schema_page_field_id}}"
        save_field: add_list

      - key: update_array
        name: 生成uuid
        enable: "{{must .add_list}}"
        foreach: "[add_list]"
        item: item
        fields:
          - field: schema_page_field_id
            template: "{{ uuid }}"
          - field: order_index
            template: "[item.order_index]"
            type: int32
      - key: service2field
        enable: "{{must .add_list}}"
        service:
          service: system.page_schema_field_create_bulk
          field_list: "[add_list]"
      - key: params2result
        fields:
          - from: "[remote_field_list]"
            to: remote_field_list
          - from: "[update_list]"
            to: update_list
          - from: "[add_list]"
            to: add_list
  - key: page_schema_field_download
    module: empty
    http: true
    excel_config: "./field2excel.json"
    params:
      excel_path:
        template: './template/{{current_date_format "20220202"}}/user_{{  replace (sub_str current_date_time -8 0) ":" ""}}_{{sub_str uuid -8 0}}.xlsx'
      response_name:
        default: "page_schema_field_detail.xlsx"
      schema_page_code:
        check:
          template: "{{must .schema_page_code}}"
          err_msg: 编号不能为空
    handler_params:
      - key: service2field
        service:
          service: system.get_page_schema_field
          schema_page_code: "[schema_page_code]"
        save_field: field_list
      - key: data2excel
        path: "[excel_path]"
      - key: file2result
        path: "[excel_path]"
        result_name: "[response_name]"
  - key: get_page_schema_field
    module: sql
    http: true
    params:
      schema_page_code:
        check:
          template: "{{or (must .schema_page_code) (must .schema_page_code_list)}}"
          err_msg: 编号不能为空
      schema_page_code_list:
        default: []
      search:
        template: "{{ if .search}}%{{.search}}%{{end}}"
    data_file: get_page_schema_field.sql
    result_handler:
      - key: result2params
        fields:
          - to: "[fields]"
      - key: update_array
        enable: "{{must .fields}}"
        foreach: "[fields]"
        item: item
        fields:
          - field: attrs
            template: "[item.attr]"
            type: "json"

  - key: get_page_schema_field_group
    http: true
    module: empty
    params:
      schema_page_code:
        check:
          template: "{{must .schema_page_code}}"
          err_msg: 编号不能为空
      to_type:
        default: "frontend"
    handler_params:
      - key: service2field
        service:
          service: system.get_page_schema_field
          schema_page_code: "[schema_page_code]"
        save_field: schema_fields
      - key: to_tree
        name: 后端转树
        enable: "{{must .schema_fields}}"
        foreach: "[schema_fields]"
        id: key
        pid: parent_key
        children: children
        save_field: list
      - key: group_by
        name: 前端按照业务分组
        enable: "{{and (must .schema_fields) (eq .to_type `frontend`)}}"
        foreach: "[list]"
        children: "children"
        fields:
          - field: "[business_group]"
        save_field: list

      - key: param2result
        field: "[list]"
  - key: page_schema_field_create_bulk
    http: true
    module: bulk_create
    table: schema_page_field
    params:
      field_list:
        check:
          template: "{{must .field_list}}"
          err_msg: 列表不能为空
    model_field: "[field_list]"
  - key: page_schema_field_update_data_bulk
    http: true
    module: bulk_upsert
    table: schema_page_field
    params:
      field_list:
        check:
          template: "{{must .field_list}}"
          err_msg: 列表不能为空
    model_field: "[field_list]"

  - key: page_schema_field_save
    http: true
    module: model_save
    table: schema_page_field
    params:
      schema_page_field_id:
        template: "{{uuid}}"
      schema_page_code:
        check:
          template: "{{must .schema_page_code}}"
          err_msg: 编号不能为空
      create_time:
        template: "{{current_date_time}}"
  - key: page_schema_field_update
    http: true
    module: model_update
    table: schema_page_field
    params:
      schema_page_field_id:
        check:
          template: "{{must .schema_page_field_id}}"
          err_msg: 主键不能为空
      schema_page_code:
        check:
          template: "{{must .schema_page_code}}"
          err_msg: 编号不能为空
    filter:
      schema_page_field_id: "[schema_page_field_id]"
  - key: page_schema_field_delete
    http: true
    module: model_delete
    table: schema_page_field
    params:
      schema_page_field_id_list:
        check:
          template: "{{must .schema_page_field_id_list}}"
          err_msg: 主键不能为空
    filter:
      schema_page_field_id__in: "[schema_page_field_id_list]"
  - key: page_schema_field_delete_by_schema_page_id
    http: true
    module: model_delete
    table: schema_page_field
    params:
      schema_page_id_list:
        check:
          template: "{{must .schema_page_id_list}}"
          err_msg: 页面不能为空
    filter:
      schema_page_id__in: "[schema_page_id_list]"

  - key: page_schema_field_update_order_index
    http: true
    module: empty
    params:
      rows:
        check:
          template: "{{must .rows}}"
          err_msg: 排序记录不能为空
    handler_params:
      - key: update_array
        foreach: rows
        item: item
        fields:
          - field: order_index
            template: "[item.order_index]"
            type: "int32"
      - key: service2field
        service:
          service: system.page_schema_field_update_bulk
          page_schema_field_list: "[rows]"
      - key: param2result
        field: "[rows]"

  - key: page_schema_field_update_bulk
    module: bulk_upsert
    http: true
    params:
      page_schema_field_list:
        check:
          template: "{{must .page_schema_field_list}}"
          err_msg: 排序记录不能为空
    table: schema_page_field
    update_fields:
      - order_index
    model_field: "[page_schema_field_list]"