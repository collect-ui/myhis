service:
  - key: location_tracker_save
    http: true
    module: model_save
    table: location_tracker
    params:
      location_tracker_id:
        template: "{{uuid}}"
      path:
        default: ""
      menu_code:
        default: ""
      extra_data:
        default: ""
      create_time:
        template: "{{current_date_time}}"
      create_user:
        template: "{{.session_user_id}}"
    handler_params:
      - key: client_ip
        save_field: client_ip
      - key: service2field
        service:
          service: system.finish_last_location_tracker

  - key: location_tracker_update
    http: true
    module: model_update
    table: location_tracker
    params:
      location_tracker_id:
        check:
          template: "{{must .location_tracker_id}}"
          err_msg: "跟踪记录ID不能为空"
    filter:
      location_tracker_id: "[location_tracker_id]"

  - key: location_tracker_delete
    http: true
    module: model_delete
    table: location_tracker
    params:
      location_tracker_id_list:
        check:
          template: "{{must .location_tracker_id_list}}"
          err_msg: "请选择要删除的跟踪记录"
    filter:
      location_tracker_id__in: "[location_tracker_id_list]"

  - key: location_tracker_query
    http: true
    module: sql
    table: location_tracker
    params:
      search:
        template: "{{ if .search }}%{{.search}}%{{ end }}"
      path:
      menu_code:
      create_user:
      start_time:
      end_time:
      page:
        type: int
        default: 1
      size:
        default: 20
        type: int
      start:
        template: " ({{.page}}-1) * {{.size}}"
        exec: true
        type: int
      pagination:
        default: true
      to_obj:
        default: false
      belong_project:
        template: "{{get_key `project`}}"
    data_file: query.sql
    count_file: count.sql
    pagination: pagination
    result_handler:
      - key: result2params
        fields:
          - to: "[user_list]"
      - key: service2field
        enable: "{{gt (len .user_list) 0}}"
        service:
          service: system.translate_user_list
          user_list: "[user_list]"
        save_field: user_list
      - key: param2result
        field: user_list
      - key: arr2obj
        enable: "[to_obj]"
  - key: finish_last_location_tracker
    module: empty
    log: true
    params:
      finish_time:
        template: "{{current_date_time}}"
    handler_params:
      - key: service2field
        name: 查找最后一条未完成的记录
        service:
          service: system.location_tracker_query
          to_obj: true
          last_30_min: true
          limit: 1
        save_field: data
      - key: service2field
        name: 更新完成时间
        enable: "{{must .data.location_tracker_id}}"
        service:
          service: system.location_tracker_update
          location_tracker_id: "[data.location_tracker_id]"
          finish_time: "[finish_time]"


